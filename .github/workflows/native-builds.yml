name: Native Builds

# Continuous integration + native packaging for the Minelib launcher.
#
# ┌─ test ──────────────────────────── every push / PR
# │   └─ desktop (linux deb, mac dmg, windows exe)  ─┐
# │   └─ android (apk)                               ├─ tags only
# │        └─ release-assets                        ─┘
#
# Platform outputs
#   Linux   → .deb  (jpackage, Liberica JDK Full 21 + fakeroot)
#   macOS   → .dmg  (jpackage, Liberica JDK Full 21)
#   Windows → .exe  (jpackage + WiX 3.14, Liberica JDK Full 21)
#   Android → .apk  (AGP 8.2.2, Android SDK on ubuntu-latest)

on:
  push:
    branches: ['**']   # run tests on every push to any branch
    tags: ['v*']       # also trigger the full native-build pipeline on version tags
  pull_request:        # run tests on every pull request
  workflow_dispatch:   # allow manual trigger for the full pipeline

permissions:
  contents: write   # needed to upload release assets

jobs:
  # ─── Tests ────────────────────────────────────────────────────────────────
  # All downstream jobs depend on this.  Tests are headless (no JavaFX toolkit
  # initialised) so they run fine on every runner type.
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Liberica JDK 21 Full (includes JavaFX for compilation)
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: '21'
          java-package: jdk+fx
          cache: gradle

      - name: Run launcher tests
        run: ./gradlew :launcher:test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: launcher/build/reports/tests/
          retention-days: 7

  desktop:
    name: Desktop (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: linux-deb

          - os: macos-latest
            artifact-name: macos-dmg

          - os: windows-latest
            artifact-name: windows-exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Liberica JDK Full bundles JavaFX as proper JDK modules, so jpackage can
      # bundle javafx.controls / javafx.graphics into the self-contained image.
      - name: Set up Liberica JDK 21 Full (includes JavaFX)
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: '21'
          java-package: jdk+fx
          cache: gradle

      # jpackage --type exe requires WiX 3.x (not 4.x).
      # windows-latest (2025) no longer ships WiX 3 pre-installed, so we pin
      # version 3.14.1 explicitly via Chocolatey and add its bin dir to PATH.
      - name: Install WiX 3 toolset (Windows, required by jpackage --type exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --version 3.14.1 --no-progress -y
          $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (Test-Path $wixBin) {
            "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "WiX 3.14 added to PATH: $wixBin"
          } else {
            # Chocolatey may install to a slightly different path; find it
            $found = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin" -ErrorAction SilentlyContinue |
                     Select-Object -First 1 -ExpandProperty FullName
            if ($found) {
              "$found" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              Write-Host "WiX found at: $found"
            } else {
              Write-Error "WiX toolset not found after install"
              exit 1
            }
          }

      - name: Install Linux packaging tools (fakeroot needed by jpackage --type deb)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y fakeroot binutils

      # Read the version from gradle.properties so the package version always
      # matches the project version (no more hardcoded 0.1.0).
      - name: Read project version
        id: ver
        shell: bash
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Launcher version: $VERSION"

      - name: Assemble jpackage input directory
        run: ./gradlew :launcher:jpackageInput --no-daemon

      - name: Create native package — Linux (.deb)
        if: runner.os == 'Linux'
        run: |
          jpackage \
            --input        launcher/build/jpackage-input \
            --main-jar     launcher.jar \
            --main-class   io.minelib.launcher.Main \
            --name         MinelibLauncher \
            --type         deb \
            --add-modules  javafx.controls,javafx.graphics,javafx.fxml,javafx.base \
            --app-version  "${{ steps.ver.outputs.version }}" \
            --vendor       "Minelib" \
            --description  "Cross-platform Minecraft launcher" \
            --linux-app-category games \
            --dest         native-packages

      - name: Create native package — macOS (.dmg)
        if: runner.os == 'macOS'
        run: |
          jpackage \
            --input                  launcher/build/jpackage-input \
            --main-jar               launcher.jar \
            --main-class             io.minelib.launcher.Main \
            --name                   MinelibLauncher \
            --type                   dmg \
            --add-modules            javafx.controls,javafx.graphics,javafx.fxml,javafx.base \
            --app-version            "${{ steps.ver.outputs.version }}" \
            --vendor                 "Minelib" \
            --description            "Cross-platform Minecraft launcher" \
            --mac-package-identifier io.minelib.launcher \
            --dest                   native-packages

      - name: Create native package — Windows (.exe)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          jpackage `
            --input       launcher/build/jpackage-input `
            --main-jar    launcher.jar `
            --main-class  io.minelib.launcher.Main `
            --name        MinelibLauncher `
            --type        exe `
            --add-modules "javafx.controls,javafx.graphics,javafx.fxml,javafx.base" `
            --app-version "${{ steps.ver.outputs.version }}" `
            --vendor      "Minelib" `
            --description "Cross-platform Minecraft launcher" `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --dest        native-packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: native-packages/
          retention-days: 30

  # ─── Android APK ────────────────────────────────────────────────────────────
  android:
    name: Android APK
    needs: test
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # ubuntu-latest ships Android SDK with compileSdk 34 + build-tools 34.0.0
      # pre-installed.  The -PandroidBuild=true flag activates the launcher-android
      # Gradle subproject (kept opt-in to avoid requiring the SDK for normal builds).
      - name: Build debug APK
        run: ./gradlew :launcher-android:assembleDebug -PandroidBuild=true --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: launcher-android/build/outputs/apk/debug/*.apk
          retention-days: 30

  # ─── Attach all artifacts to the GitHub Release ─────────────────────────────
  release-assets:
    name: Attach to Release
    needs: [desktop, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-artifacts/**/*
