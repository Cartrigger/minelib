name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build (JAR + Android AAR + tests)
        run: ./gradlew build test --no-daemon

      # Verify the Android AAR was produced — no Android SDK required because
      # androidAar is a pure-Java Zip task (classes.jar + AndroidManifest.xml).
      - name: Verify Android AAR exists
        run: |
          aar=$(ls build/libs/minelib-*-android.aar 2>/dev/null | head -1)
          if [ -z "$aar" ]; then
            echo "ERROR: Android AAR was not produced by the build"
            exit 1
          fi
          echo "Android AAR: $aar ($(du -h "$aar" | cut -f1))"

      - name: Upload Android AAR
        uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: build/libs/minelib-*-android.aar

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/
