name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # -----------------------------------------------------------------------
      # Build everything: JAR, AAR, Linux .so files, Windows .dll files
      # -----------------------------------------------------------------------
      - name: Build all artifacts
        run: >
          ./gradlew
          jar
          androidAar
          extractLinuxNatives
          extractWindowsNatives
          --no-daemon

      # -----------------------------------------------------------------------
      # Bundle natives into zip archives for easy distribution
      # -----------------------------------------------------------------------
      - name: Bundle Linux natives
        run: |
          cd build/natives/linux
          zip -j ../../../minelib-natives-linux.zip *.so

      - name: Bundle Windows natives
        run: |
          cd build/natives/windows
          zip -j ../../../minelib-natives-windows.zip *.dll

      # -----------------------------------------------------------------------
      # Create GitHub Release and upload all artifacts
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/libs/minelib-*.jar
            build/libs/minelib-*.aar
            minelib-natives-linux.zip
            minelib-natives-windows.zip
